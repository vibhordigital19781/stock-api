<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bazaar Watch — Offline</title>
  <link rel="manifest" href="/site.webmanifest"/>
  <meta name="theme-color" content="#FF9933"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#060a0e;
      color:#d6e6f4;
      font-family:'Inter','Segoe UI',sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      gap:20px;
    }
    .logo{
      font-size:32px;
      font-weight:800;
      letter-spacing:-0.5px;
    }
    .logo span{color:#FF9933}
    .icon{
      width:72px;height:72px;
      border-radius:50%;
      background:rgba(255,153,51,0.1);
      border:1px solid rgba(255,153,51,0.3);
      display:flex;align-items:center;justify-content:center;
      font-size:32px;
    }
    h1{font-size:20px;font-weight:600;color:#e8e8e8;margin-top:4px}
    p{font-size:14px;color:#5c7f9a;line-height:1.6;max-width:320px}
    .pill{
      display:inline-block;
      background:rgba(255,153,51,0.12);
      border:1px solid rgba(255,153,51,0.3);
      color:#FF9933;
      font-size:11px;
      font-weight:600;
      padding:4px 14px;
      border-radius:20px;
      letter-spacing:.5px;
    }
    button{
      margin-top:8px;
      background:rgba(255,153,51,0.15);
      border:1px solid rgba(255,153,51,0.4);
      color:#FF9933;
      font-size:13px;
      font-weight:600;
      padding:10px 28px;
      border-radius:8px;
      cursor:pointer;
      font-family:inherit;
      transition:background .2s;
    }
    button:hover{background:rgba(255,153,51,0.25)}
    .dots{display:flex;gap:6px;justify-content:center}
    .dot{
      width:6px;height:6px;border-radius:50%;
      background:rgba(255,153,51,0.3);
      animation:pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  </style>
</head>
<body>
  <div class="logo">Bazaar<span>Watch</span></div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Market data needs a live connection. Please check your network — the dashboard will resume automatically.</p>
  <div class="pill">LIVE DATA PAUSED</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <button onclick="location.reload()">Try Again</button>
  <script>
    // Auto-reload when connection restores
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
